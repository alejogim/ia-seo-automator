name: Publicar Post Diario
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Instalar dependencias
        run: pip install -r requirements.txt
        
      - name: Ejecutar script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python script.py

      - name: Guardar post generado en el repo
        run: |
          git config --global user.name 'IA-Automator'
          git config --global user.email 'ia@automator.com'
          git add ultimo_post.html
          git commit -m "📝 Nuevo post generado por IA" || echo "Sin cambios"
          git push
