name: Publicar Post Diario
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso para que GitHub guarde la base de datos
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Versión actualizada para evitar advertencias
          
      - name: Instalar dependencias
        run: pip install -r requirements.txt
        
      - name: Ejecutar script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python script.py

      - name: Guardar Historial (Memoria)
        run: |
          git config --global user.name 'IA-Automator'
          git config --global user.email 'ia@automator.com'
          git add historial.db
          git commit -m "Update: Noticia procesada" || echo "Sin cambios"
          git push
